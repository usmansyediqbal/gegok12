version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school_app
    working_dir: /var/www
    user: "0:0"
    volumes:
      - ./:/var/www
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://your-server-ip
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=school
      - DB_USERNAME=laravel
      - DB_PASSWORD=root_password
    depends_on:
      - db
    networks:
      - laravel
    restart: unless-stopped

  node:
    image: node:24
    container_name: node_app
    working_dir: /var/www
    user: "0:0"
    volumes:
      - ./:/var/www
    command: tail -f /dev/null  
    networks:
      - laravel
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: mysql_database
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: school
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_PASSWORD: root_password
      MYSQL_USER: laravel
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: unless-stopped
    ports:
      - "8092:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_password
    networks:
      - laravel

  nginx:
    image: nginx:latest
    container_name: laravel_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - laravel
    restart: unless-stopped

networks:
  laravel:

volumes:
  dbdata:
